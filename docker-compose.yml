services:
  # ── ngrok tunnel ───────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "bot:3000"
      - "--log=stdout"
    ports:
      - "4040:4040"   # ngrok inspector UI (optional, handy for debugging)

  # ── Bot application ───────────────────────────────────────
  bot:
    build: .
    restart: unless-stopped
    depends_on:
      - ngrok
    env_file:
      - .env
    environment:
      NGROK_ENABLED: "true"
      PORT: 3000
    volumes:
      - bot-data:/app/data    # persists auth tokens + subscription ID

volumes:
  bot-data:
